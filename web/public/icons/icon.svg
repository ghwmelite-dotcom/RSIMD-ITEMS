  <line x1="336" y1="256" x2="364" y2="256" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="336" y1="296" x2="364" y2="296" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
