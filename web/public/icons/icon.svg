  <line x1="216" y1="176" x2="216" y2="148" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="176" x2="256" y2="148" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="296" y1="176" x2="296" y2="148" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="216" y1="336" x2="216" y2="364" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="364" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="296" y1="336" x2="296" y2="364" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="176" y1="216" x2="148" y2="216" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="148" y2="256" stroke="#00E676" stroke-width="4" stroke-linecap="round"/>
