  <!-- Circuit grid -->
  <line x1="128" y1="0" x2="128" y2="512" stroke="#00E676" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#00E676" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#00E676" stroke-opacity="0.05" stroke-width="1"/>
