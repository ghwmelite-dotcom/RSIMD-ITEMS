<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080F1C" />
    <title>RSIMD-ITEMS — OHCS Equipment Maintenance</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="RSIMD-ITEMS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bookman+Old+Style:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Bookman Old Style';
        src: local('Bookman Old Style'), local('Bookman'), local('URW Bookman L');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Bookman Old Style';
        src: local('Bookman Old Style Bold'), local('Bookman Bold'), local('URW Bookman L Bold');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <script>(function(){var t=localStorage.getItem('rsimd_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}})();</script>
  </head>
  <body class="bg-surface-50 dark:bg-surface-950 text-surface-900 dark:text-surface-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(function (reg) {
            // Check for updates every 5 minutes
            setInterval(function () { reg.update(); }, 300000);
            // When a new SW is found and activated, reload to get fresh assets
            reg.addEventListener("updatefound", function () {
              var newSW = reg.installing;
              if (newSW) {
                newSW.addEventListener("statechange", function () {
                  if (newSW.state === "activated" && navigator.serviceWorker.controller) {
                    window.location.reload();
                  }
                });
              }
            });
          }).catch(function () {});
        });
      }
    </script>
  </body>
</html>
